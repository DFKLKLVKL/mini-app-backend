<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Tracker</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="app-container">

    <div class="header">
        <div>
            <h1>🎮 Steam Tracker</h1>
            <p>Отслеживай скидки</p>
        </div>
        <div id="tgUserInfo"></div>
    </div>

    <!-- ФОРМА -->
    <div class="add-game-form">
        <input id="name" placeholder="Название">
        <input id="image" placeholder="URL картинки">
        <input id="oldPrice" type="number" placeholder="Старая цена">
        <input id="newPrice" type="number" placeholder="Новая цена">
        <input type="number" id="appId" placeholder="steam app ID">
        <button id="addBtn">➕ Добавить</button>
    </div>

    <!-- ФИЛЬТРЫ -->
    <div class="controls">
        <div>
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="wishlist">Вишлист</button>
            <button class="filter-btn" data-filter="high">-70%</button>
        </div>
        <input id="searchInput" placeholder="Поиск">
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats">
        <span>Игр: <b id="totalGames">0</b></span>
        <span>Вишлист: <b id="wishlistCount">0</b></span>
        <span>Макс скидка: <b id="maxDiscount">0%</b></span>
    </div>

    <!-- ИГРЫ -->
    <div id="gamesGrid"></div>

    <button id="refreshBtn">⟳ Обновить</button>

</div>

<script src="main.js"></script>
</body>
</html>
